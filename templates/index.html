<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Video Downloader</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* CSS Variables from the Portfolio */
    :root {
        --primary-red: #E50914;
        --primary-red-dark: #B20710;
        --mouse-x: 50vw;
        --mouse-y: 50vh;
    }

    /* Base Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        /* Matching the portfolio background */
        font-family: 'IBM Plex Mono', monospace;
        background-color: #0a0a0a;
        color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
    }

    /* Interactive Cursor Glow (from Portfolio) */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(229, 9, 20, 0.15), transparent 80%);
        z-index: 0;
        pointer-events: none;
    }

    /* Raining Code Canvas (Background) */
    #raining-code-canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        opacity: 0.8; /* Slightly reduce opacity for foreground focus */
    }

    /* --- Main Downloader Container --- */
    .container {
        /* Glass-like card effect adapted */
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        border: 1px solid rgba(229, 9, 20, 0.5); /* Primary red border */
        box-shadow: 0 0 25px rgba(229, 9, 20, 0.3); /* Soft red glow */
        padding: 40px;
        text-align: center;
        width: 90%;
        max-width: 480px;
        position: relative;
        z-index: 10; /* Ensure it's above the canvas */
        animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        color: var(--primary-red);
        margin-bottom: 30px;
        font-size: 2em;
        font-weight: 600;
        /* Subtle text shadow/glow */
        text-shadow: 0 0 8px rgba(229, 9, 20, 0.6);
    }

    /* --- Form Elements --- */
    form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    input[type="text"] {
        width: 100%;
        padding: 15px;
        border: 1px solid #333;
        border-radius: 8px;
        background-color: #1a1a1a;
        color: #f0f0f0;
        font-size: 1em;
        font-family: inherit;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    input[type="text"]::placeholder {
        color: #888;
    }

    input[type="text"]:focus {
        border-color: var(--primary-red);
        box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        background-color: #222;
        outline: none;
    }

    /* --- Download Button (Shimmer Button adaptation) --- */
    .shimmer-btn {
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        padding: 15px;
        background-color: var(--primary-red);
        color: white;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1em;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 0 5px rgba(229, 9, 20, 0);
    }
    .shimmer-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(229, 9, 20, 0.5), 0 0 10px rgba(229, 9, 20, 0.4);
    }
    .shimmer-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
        transform: skewX(-20deg);
        transition: left 0.7s ease-in-out;
    }
    .shimmer-btn:hover::before {
        left: 150%;
    }

    /* --- Footer --- */
    .footer {
        position: absolute;
        bottom: 20px;
        color: var(--primary-red);
        font-size: 0.8em;
        text-align: center;
        width: 100%;
        left: 0;
        z-index: 5;
        text-shadow: 0 0 3px rgba(229, 9, 20, 0.5);
    }

    /* Removed unnecessary note styles as the note text was removed */
  </style>
</head>
<body>

  <canvas id="raining-code-canvas"></canvas>

  <div class="container">
    <h1>📥 Instagram Video Downloader</h1>
    <form action="/download" method="POST">
      <input
        type="text"
        name="url"
        placeholder="Paste Instagram video or reel link here..."
        required
      />
      <button type="submit" class="shimmer-btn">Download</button>
    </form>
  </div>

  <div class="footer">
    Created by Harshith
  </div>

  <script>
    // 1. Interactive Cursor Glow
    window.addEventListener('mousemove', e => {
        document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
        document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
    });

    // 2. Raining Code Animation Logic
    const canvas = document.getElementById('raining-code-canvas');
    // Ensure getContext('2d') is correctly used
    const ctx = canvas.getContext('2d');

    let animationFrameId;
    const fontSize = 16;
    let columns;
    const drops = [];
    // Character set: binary, brackets, and common code symbols
    const codeChars = "01<>/{}[]+=-*()&^%$#@!~";
    const chars = codeChars.split('');

    function setupAndResize() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
        }
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);
        columns = Math.floor(window.innerWidth / fontSize);
        drops.length = 0;
        for (let i = 0; i < columns; i++) {
            drops[i] = 1; // Start each drop at the top
        }
    }

    function draw() {
        // Transparent black layer to create the trail effect
        ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-red').trim() || '#E50914';
        const highlightColor = '#ffffff';
        ctx.font = fontSize + 'px IBM Plex Mono';

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.shadowBlur = 0;

            // Randomly highlight the first character in the column
            if (drops[i] === 1 || Math.random() > 0.985) {
                ctx.fillStyle = highlightColor;
                ctx.shadowColor = highlightColor;
                ctx.shadowBlur = 10;
            } else {
                ctx.fillStyle = primaryColor;
            }

            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            // Reset drop to the top when it reaches the bottom of the screen
            if (drops[i] * fontSize > window.innerHeight && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    function animate() {
        draw();
        animationFrameId = requestAnimationFrame(animate);
    }

    // Start the animation after setup
    setupAndResize();
    animate();

    window.addEventListener('resize', () => {
        setupAndResize();
        // The animate loop is already running, no need to call animate again.
    });
  </script>
</body>
</html>
