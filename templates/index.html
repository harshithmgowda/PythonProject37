<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Video Downloader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>📥 Instagram Videder</h1>
    <form action="/download" method="POST">
      <input type="text" name="url" placeholder="Paste Instagram video or reel link..." required>
      <button type="submit">Download</button>
    </form>
    <p class="note">
      Works for Reels, videos, and posts accessible by your account.<br>
      Chrome will show the download bar.
    </p>
  </div>
</body>
</html>
